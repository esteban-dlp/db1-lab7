services:
  postgres:
    image: postgres:16
    container_name: retailmax-postgres
    environment:
      POSTGRES_DB: retailmax
      POSTGRES_USER: retailmax
      POSTGRES_PASSWORD: retailmax123
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailmax -d retailmax"]
      interval: 10s
      timeout: 5s
      retries: 12

  metabase:
    image: metabase/metabase:v0.61.3.3
    container_name: retailmax-metabase
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_SITE_LOCALE: es
      MB_EMOJI_IN_LOGS: "false"
      JAVA_TIMEZONE: America/Guatemala
    ports:
      - "3030:3000"
    volumes:
      - ./metabase-data:/metabase-data

  metabase-setup:
    image: python:3.12-slim
    container_name: retailmax-metabase-setup
    depends_on:
      - metabase
    environment:
      METABASE_URL: http://metabase:3000
      METABASE_EMAIL: calificar@uvg.edu.gt
      METABASE_PASSWORD: secret123+
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: retailmax
      POSTGRES_USER: retailmax
      POSTGRES_PASSWORD: retailmax123
    volumes:
      - ./scripts:/app/scripts:ro
    working_dir: /app
    command: ["python", "scripts/setup_metabase.py"]
    restart: "no"

volumes:
  postgres-data:
